<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromaBet — Banker Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #08080c;
    --surface: #101015;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f8;
    --muted: #6b6b80;
    --gold: #ffd166;
    --accent: #ff3c5f;
    --teal: #06d6a0;
    --c-red: #ef4444; --c-blue: #3b82f6; --c-green: #22c55e;
    --c-yellow: #eab308; --c-purple: #a855f7; --c-orange: #f97316;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--gold); }
  .banker-badge {
    background: rgba(255,209,102,0.15); color: var(--gold);
    border: 1px solid rgba(255,209,102,0.3);
    border-radius: 20px; padding: 0.25rem 0.85rem;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .phase-indicator {
    padding: 0.3rem 1rem; border-radius: 20px;
    font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .pi-waiting { background: rgba(107,107,128,0.2); color: var(--muted); }
  .pi-betting { background: rgba(6,214,160,0.2); color: var(--teal); }
  .pi-closed  { background: rgba(255,60,95,0.2); color: var(--accent); }
  .pi-result  { background: rgba(255,209,102,0.2); color: var(--gold); }

  .layout {
    flex: 1; display: grid;
    grid-template-columns: 1fr 320px;
  }

  .main { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
  }
  .card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 1rem;
  }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.75rem; }
  .stat-box {
    background: var(--surface2); border-radius: 12px;
    padding: 1rem; text-align: center;
  }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; color: var(--gold); line-height: 1;
  }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; }

  /* CONTROLS */
  .btn {
    padding: 0.8rem 1.5rem;
    border: none; border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem; letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-gold { background: var(--gold); color: #08080c; }
  .btn-teal { background: var(--teal); color: #08080c; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-muted { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .controls-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }

  .timer-select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.8rem 1rem;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none;
  }

  .countdown-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem; color: var(--gold); line-height: 1;
    text-align: center;
  }
  .countdown-big.urgent { color: var(--accent); animation: blink 0.5s step-end infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }

  /* COLOR PICKER FOR REVEAL */
  .color-reveal-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .color-reveal-btn {
    padding: 1rem; border: 3px solid transparent;
    border-radius: 12px; cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem;
    color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
  }
  .color-reveal-btn:hover:not(:disabled) { transform: scale(1.05); }
  .color-reveal-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .color-reveal-btn.selected { border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.3); transform: scale(1.07); }
  .crb-Red    { background: linear-gradient(135deg,#ef4444,#dc2626); }
  .crb-Blue   { background: linear-gradient(135deg,#3b82f6,#2563eb); }
  .crb-Green  { background: linear-gradient(135deg,#22c55e,#16a34a); }
  .crb-Yellow { background: linear-gradient(135deg,#eab308,#ca8a04); }
  .crb-Purple { background: linear-gradient(135deg,#a855f7,#9333ea); }
  .crb-Orange { background: linear-gradient(135deg,#f97316,#ea580c); }
  .crb-bets { font-size: 0.7rem; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.1rem 0.4rem; }

  /* SIDEBAR */
  .sidebar {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
  }
  .sidebar-section { padding: 1rem; border-bottom: 1px solid var(--border); }
  .sidebar-section h4 {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
    color: var(--muted); letter-spacing: 0.1em; margin-bottom: 0.75rem;
  }
  .player-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5rem 0.6rem; background: var(--surface2);
    border-radius: 8px; margin-bottom: 0.4rem; font-size: 0.82rem;
  }
  .player-row .pname { font-weight: 500; flex: 1; }
  .player-row .pbal { color: var(--gold); margin: 0 0.5rem; }
  .player-row .pbet-tag {
    font-size: 0.68rem; padding: 0.1rem 0.5rem;
    border-radius: 6px; background: rgba(6,214,160,0.15); color: var(--teal);
    display: none;
  }
  .player-row .pbet-tag.visible { display: inline; }
  .add-bal-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 0.7rem; padding: 0.1rem 0.4rem;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .add-bal-btn:hover { color: var(--gold); border-color: var(--gold); }

  .history-list { max-height: 220px; overflow-y: auto; }
  .hist-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.35rem 0.5rem; font-size: 0.78rem;
    background: var(--surface2); border-radius: 6px; margin-bottom: 0.3rem;
  }
  .hist-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .hist-dot.Red{background:#ef4444} .hist-dot.Blue{background:#3b82f6} .hist-dot.Green{background:#22c55e}
  .hist-dot.Yellow{background:#eab308} .hist-dot.Purple{background:#a855f7} .hist-dot.Orange{background:#f97316}

  /* TOAST */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 0.75rem 1.5rem;
    font-size: 0.9rem; z-index: 1000;
    transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--teal); color: var(--teal); }
  .toast.error { border-color: var(--accent); color: var(--accent); }
  .toast.info { border-color: var(--gold); color: var(--gold); }

  /* CONNECTION */
  .conn-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:0.4rem; }
  .conn-dot.on { background:var(--teal); box-shadow: 0 0 6px var(--teal); }
  .conn-dot.off { background:var(--accent); }

  @media (max-width:700px) {
    .layout { grid-template-columns:1fr; }
    .sidebar { border-left:none; border-top:1px solid var(--border); }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="logo">ChromaBet</span>
    <span class="banker-badge">🏦 Banker</span>
    <span id="phaseIndicator" class="phase-indicator pi-waiting">Waiting</span>
    <span style="color:var(--muted);font-size:0.85rem" id="roundLabel"></span>
  </div>
  <div style="display:flex;align-items:center;gap:0.75rem">
    <span style="font-size:0.8rem;color:var(--muted)"><span class="conn-dot off" id="connDot"></span><span id="connLabel">Connecting...</span></span>
    <a href="index.html" style="color:var(--muted);font-size:0.8rem;text-decoration:none">← Lobby</a>
  </div>
</div>

<div class="layout">
  <div class="main">

    <!-- Stats -->
    <div class="card">
      <h3>Round Overview</h3>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="statPlayers">0</div>
          <div class="stat-lbl">Players</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statBets">0</div>
          <div class="stat-lbl">Bets Placed</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statPot">₱0</div>
          <div class="stat-lbl">Total Pot</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statCountdown">—</div>
          <div class="stat-lbl">Time Left</div>
        </div>
      </div>
    </div>

    <!-- Game Controls -->
    <div class="card">
      <h3>Game Controls</h3>
      <div class="controls-row">
        <select class="timer-select" id="timerSelect">
          <option value="20">20 seconds</option>
          <option value="30" selected>30 seconds</option>
          <option value="45">45 seconds</option>
          <option value="60">60 seconds</option>
          <option value="90">90 seconds</option>
        </select>
        <button class="btn btn-teal" id="startBettingBtn" onclick="startBetting()">▶ Start Betting</button>
        <button class="btn btn-muted" id="resetBtn" onclick="resetGame()">↺ Reset Game</button>
      </div>
    </div>

    <!-- Color Reveal -->
    <div class="card">
      <h3>Reveal Winning Color</h3>
      <div class="color-reveal-grid" id="revealGrid"></div>
      <button class="btn btn-accent" id="revealBtn" onclick="revealColor()" disabled style="width:100%">
        🎲 Reveal Selected Color
      </button>
    </div>

    <!-- Bet Distribution -->
    <div class="card">
      <h3>Bet Distribution</h3>
      <div id="betDistribution" style="display:flex;flex-direction:column;gap:0.5rem"></div>
    </div>

  </div>

  <div class="sidebar">
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <h4>Players</h4>
      <div id="playerList"></div>
    </div>
    <div class="sidebar-section">
      <h4>History</h4>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WS_URL = `ws://${location.hostname}:3000`;
  let ws;
  let selectedRevealColor = null;
  let gameState = {};
  let betCounts = {};

  const COLORS = ['Red','Blue','Green','Yellow','Purple','Orange'];
  const COLOR_HEX = {
    Red:'#ef4444', Blue:'#3b82f6', Green:'#22c55e',
    Yellow:'#eab308', Purple:'#a855f7', Orange:'#f97316'
  };

  // Build reveal grid
  const revealGrid = document.getElementById('revealGrid');
  COLORS.forEach(color => {
    const btn = document.createElement('button');
    btn.className = `color-reveal-btn crb-${color}`;
    btn.dataset.color = color;
    btn.disabled = true;
    btn.innerHTML = `${color}<span class="crb-bets" id="rb-${color}">0 bets</span>`;
    btn.onclick = () => selectRevealColor(color);
    revealGrid.appendChild(btn);
  });

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'join', role: 'banker', id: 'banker', name: 'Banker' }));
      setConn(true);
    };
    ws.onmessage = e => handleMsg(JSON.parse(e.data));
    ws.onclose = () => {
      setConn(false);
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  function setConn(on) {
    document.getElementById('connDot').className = 'conn-dot ' + (on ? 'on' : 'off');
    document.getElementById('connLabel').textContent = on ? 'Connected' : 'Reconnecting...';
  }

  function handleMsg(msg) {
    switch(msg.type) {
      case 'state':
        gameState = msg;
        betCounts = msg.betCounts || {};
        applyState(msg);
        break;
      case 'countdown':
        document.getElementById('statCountdown').textContent = msg.value + 's';
        const cd = document.getElementById('statCountdown');
        cd.style.color = msg.value <= 5 ? 'var(--accent)' : 'var(--gold)';
        break;
      case 'phaseChange':
        updatePhaseUI(msg.phase, msg.round);
        break;
      case 'reset':
        showToast('Game reset.', 'info');
        break;
      case 'joined':
        showToast('Banker connected ✓', 'success');
        break;
    }
  }

  function applyState(state) {
    const players = (state.players || []).filter(p => p.id !== 'banker');
    const betsCount = players.filter(p => p.hasBet).length;
    const pot = Object.entries(state.betCounts || {}).reduce((s, [c, count]) => {
      // We don't have per-color amounts in state, but we track counts
      return s;
    }, 0);

    document.getElementById('statPlayers').textContent = players.length;
    document.getElementById('statBets').textContent = betsCount;

    if (state.round > 0) {
      document.getElementById('roundLabel').textContent = `Round ${state.round}`;
    }

    // Update bet counts on reveal buttons
    COLORS.forEach(c => {
      const cnt = (state.betCounts || {})[c] || 0;
      const el = document.getElementById('rb-' + c);
      if (el) el.textContent = cnt + ' bet' + (cnt !== 1 ? 's' : '');
    });

    // Bet distribution bars
    const dist = document.getElementById('betDistribution');
    const totalBets = Object.values(state.betCounts || {}).reduce((a,b) => a+b, 0);
    dist.innerHTML = '';
    COLORS.forEach(c => {
      const cnt = (state.betCounts || {})[c] || 0;
      const pct = totalBets > 0 ? Math.round((cnt / totalBets) * 100) : 0;
      const row = document.createElement('div');
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;margin-bottom:0.25rem;font-size:0.8rem">
          <span style="display:flex;align-items:center;gap:0.4rem">
            <span style="width:10px;height:10px;border-radius:50%;background:${COLOR_HEX[c]};display:inline-block"></span>
            ${c}
          </span>
          <span style="color:var(--muted)">${cnt} (${pct}%)</span>
        </div>
        <div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:0.6rem">
          <div style="height:100%;width:${pct}%;background:${COLOR_HEX[c]};border-radius:3px;transition:width 0.4s"></div>
        </div>
      `;
      dist.appendChild(row);
    });

    // Player list
    const list = document.getElementById('playerList');
    list.innerHTML = '';
    players.forEach(p => {
      const div = document.createElement('div');
      div.className = 'player-row';
      div.innerHTML = `
        <span class="pname">${escHtml(p.name)}</span>
        <span class="pbal">₱${(p.balance||0).toLocaleString()}</span>
        <span class="pbet-tag ${p.hasBet ? 'visible' : ''}">BET</span>
        <button class="add-bal-btn" onclick="addBalance('${p.id}', 500)">+₱500</button>
      `;
      list.appendChild(div);
    });

    // History
    const hist = document.getElementById('historyList');
    hist.innerHTML = '';
    (state.history || []).slice().reverse().forEach(h => {
      const div = document.createElement('div');
      div.className = 'hist-item';
      div.innerHTML = `
        <div class="hist-dot ${h.winner}"></div>
        <span>Round ${h.round}</span>
        <span style="color:${COLOR_HEX[h.winner]};font-weight:600">${h.winner}</span>
        <span style="color:var(--muted)">₱${h.totalPot}</span>
      `;
      hist.appendChild(div);
    });

    updatePhaseUI(state.phase, state.round);
  }

  function updatePhaseUI(phase, round) {
    const ind = document.getElementById('phaseIndicator');
    const startBtn = document.getElementById('startBettingBtn');
    const revealBtn = document.getElementById('revealBtn');

    document.querySelectorAll('.color-reveal-btn').forEach(b => b.disabled = true);

    ind.className = 'phase-indicator pi-' + phase;
    const labels = { waiting:'Waiting', betting:'Betting Open', closed:'Bets Closed', result:'Results' };
    ind.textContent = labels[phase] || phase;

    if (phase === 'waiting' || phase === 'result') {
      startBtn.disabled = false;
      revealBtn.disabled = true;
      document.getElementById('statCountdown').textContent = '—';
    } else if (phase === 'betting') {
      startBtn.disabled = true;
      revealBtn.disabled = true;
    } else if (phase === 'closed') {
      startBtn.disabled = true;
      revealBtn.disabled = selectedRevealColor === null;
      document.querySelectorAll('.color-reveal-btn').forEach(b => b.disabled = false);
      document.getElementById('statCountdown').textContent = '—';
    }
  }

  function selectRevealColor(color) {
    selectedRevealColor = color;
    document.querySelectorAll('.color-reveal-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.color === color);
    });
    document.getElementById('revealBtn').disabled = false;
  }

  function startBetting() {
    const seconds = parseInt(document.getElementById('timerSelect').value);
    selectedRevealColor = null;
    document.querySelectorAll('.color-reveal-btn').forEach(b => b.classList.remove('selected'));
    ws.send(JSON.stringify({ type: 'startBetting', seconds }));
    showToast(`Betting started! ${seconds}s timer.`, 'success');
  }

  function revealColor() {
    if (!selectedRevealColor) return showToast('Select a color to reveal!', 'error');
    if (!confirm(`Reveal ${selectedRevealColor} as the winning color?`)) return;
    ws.send(JSON.stringify({ type: 'revealColor', color: selectedRevealColor }));
    document.querySelectorAll('.color-reveal-btn').forEach(b => b.disabled = true);
    document.getElementById('revealBtn').disabled = true;
    showToast(`Revealed: ${selectedRevealColor}!`, 'info');
  }

  function resetGame() {
    if (!confirm('Reset the game? All balances will return to ₱1,000.')) return;
    ws.send(JSON.stringify({ type: 'resetGame' }));
    selectedRevealColor = null;
    document.querySelectorAll('.color-reveal-btn').forEach(b => b.classList.remove('selected'));
  }

  function addBalance(targetId, amount) {
    ws.send(JSON.stringify({ type: 'addBalance', targetId, amount }));
    showToast(`Added ₱${amount} to player`, 'success');
  }

  function showToast(msg, type='info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  connect();
</script>
</body>
</html>
