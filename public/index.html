<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Game — Banker Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ====== LOBBY SCREEN ====== -->
  <div id="screen-lobby" class="screen active">
    <div class="lobby-wrap">
      <div class="logo">
        <span class="logo-icon">🎲</span>
        <h1>COLOR GAME</h1>
        <p class="logo-sub">Banker Edition</p>
      </div>

      <div class="card">
        <label class="field-label">Your Name</label>
        <input type="text" id="input-name" placeholder="Enter your name..." maxlength="18" />

        <div class="btn-row">
          <button class="btn btn-banker" onclick="App.createRoom()">
            🏦 Create Room<br><small>as Banker</small>
          </button>
          <button class="btn btn-player" onclick="App.showJoin()">
            🎮 Join Room<br><small>as Player</small>
          </button>
        </div>
      </div>

      <!-- Join panel (hidden by default) -->
      <div class="card" id="join-panel" style="display:none;">
        <label class="field-label">Room Code</label>
        <input type="text" id="input-code" placeholder="e.g. ABCD" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;font-size:1.4rem;text-align:center;" />
        <button class="btn btn-player full" onclick="App.joinRoom()">Join Game</button>
      </div>

      <p id="lobby-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ====== BANKER SCREEN ====== -->
  <div id="screen-banker" class="screen">
    <header class="game-header">
      <div class="header-left">
        <span class="role-badge banker-badge">🏦 BANKER</span>
        <span id="banker-name-display"></span>
      </div>
      <div class="header-right">
        <span class="room-code-badge">Room: <strong id="room-code-display"></strong></span>
      </div>
    </header>

    <div class="game-body">
      <!-- Status Bar -->
      <div class="status-bar">
        <div class="stat-box">
          <div class="stat-label">Round</div>
          <div class="stat-value" id="banker-round">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Phase</div>
          <div class="stat-value" id="banker-phase">Waiting</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Players</div>
          <div class="stat-value" id="banker-player-count">0</div>
        </div>
      </div>

      <!-- Result Display -->
      <div id="banker-result-area" class="result-area" style="display:none;">
        <div class="result-label">Winning Color</div>
        <div id="banker-winning-color" class="winning-color-badge"></div>
      </div>

      <!-- Banker Controls -->
      <div class="control-panel">
        <button id="btn-start-round" class="btn btn-green" onclick="App.startRound()">▶ Start Round</button>
        <button id="btn-draw" class="btn btn-red" onclick="App.drawResult()" style="display:none;">🎲 Draw Color</button>
        <button id="btn-reset" class="btn btn-gray" onclick="App.resetRound()" style="display:none;">↩ New Round</button>
      </div>

      <!-- Players Table -->
      <div class="section-title">Players</div>
      <div id="banker-players-list" class="players-grid"></div>

      <!-- History -->
      <div class="section-title">Round History</div>
      <div id="banker-history" class="history-list"></div>
    </div>
  </div>

  <!-- ====== PLAYER SCREEN ====== -->
  <div id="screen-player" class="screen">
    <header class="game-header">
      <div class="header-left">
        <span class="role-badge player-badge">🎮 PLAYER</span>
        <span id="player-name-display"></span>
      </div>
      <div class="header-right">
        <span class="room-code-badge">Room: <strong id="player-room-code-display"></strong></span>
      </div>
    </header>

    <div class="game-body">
      <!-- Status Bar -->
      <div class="status-bar">
        <div class="stat-box">
          <div class="stat-label">Round</div>
          <div class="stat-value" id="player-round">—</div>
        </div>
        <div class="stat-box highlight-box">
          <div class="stat-label">My Credits</div>
          <div class="stat-value" id="player-credits">100</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Phase</div>
          <div class="stat-value" id="player-phase">Waiting</div>
        </div>
      </div>

      <!-- Result Flash -->
      <div id="player-result-area" class="result-area" style="display:none;"></div>

      <!-- Color Picker -->
      <div id="color-picker-section">
        <div class="section-title">Pick Your Color</div>
        <div id="color-grid" class="color-grid"></div>
        <p id="color-pick-status" class="pick-status"></p>
      </div>

      <!-- All Players -->
      <div class="section-title">Players in Room</div>
      <div id="player-players-list" class="players-grid"></div>

      <!-- History -->
      <div class="section-title">Round History</div>
      <div id="player-history" class="history-list"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
